name: 每日擷取個股期貨資料

on:
  schedule:
    # 每天台灣時間 18:05（UTC+8），轉換為 UTC 10:05
    - cron: '5 10 * * 1-5'
  workflow_dispatch:
    inputs:
      backfill_start:
        description: '補抓起始日期（格式：2026-03-23，留空則抓今天）'
        required: false
        default: ''
      backfill_end:
        description: '補抓結束日期（格式：2026-03-27，留空則抓今天）'
        required: false
        default: ''

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 取出程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: |
          pip install requests beautifulsoup4 lxml

      - name: 執行爬蟲
        env:
          BACKFILL_START: ${{ github.event.inputs.backfill_start }}
          BACKFILL_END: ${{ github.event.inputs.backfill_end }}
        run: |
          python scripts/fetch_data.py

      - name: 推送資料回 GitHub
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "📊 自動更新：$(date +'%Y-%m-%d') 個股期貨資料"
          git push
